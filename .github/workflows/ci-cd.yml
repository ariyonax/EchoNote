# ============================================
# EchoNote – CI/CD Pipeline
# GitHub Actions Workflow
# ============================================

name: EchoNote CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: echonote-backend
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ── Job 1: Lint & Test ──────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: echonote_test
          MYSQL_USER: echonote_user
          MYSQL_PASSWORD: echonote_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Initialize test database
        run: |
          mysql -h 127.0.0.1 -u root -proot_password echonote_test < database/schema.sql
        env:
          MYSQL_PWD: root_password

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 5001
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: echonote_user
          DB_PASSWORD: echonote_pass
          DB_NAME: echonote_test
          JWT_SECRET: test_jwt_secret_for_ci
          OPENAI_API_KEY: ''

  # ── Job 2: Build Docker Image ───────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

  # ── Job 3: Deploy to AWS EC2 ────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/echonote

            # Pull latest code
            git pull origin main

            # Pull latest Docker image
            docker pull ${{ secrets.DOCKER_USERNAME }}/echonote-backend:latest

            # Restart containers with zero-downtime
            docker-compose pull
            docker-compose up -d --force-recreate --no-deps backend

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment complete!"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
            else
              echo "❌ Health check FAILED with status $STATUS"
              docker-compose logs --tail=50 backend
              exit 1
            fi
