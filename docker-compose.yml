version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: echonote-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: echonote_db
      MYSQL_USER: echonote_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3307:3306"
    networks:
      - echonote-net
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "echonote_user",
          "-p071204",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: echonote-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: echonote_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: echonote_db
      JWT_SECRET: ${JWT_SECRET:-echonote_secret_key_123}
      JWT_EXPIRES_IN: 7d
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - uploads_data:/app/server/uploads
      - logs_data:/app/logs
    networks:
      - echonote-net

volumes:
  db_data:
  uploads_data:
  logs_data:

networks:
  echonote-net:
    driver: bridge
