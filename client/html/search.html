<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search – EchoNote</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="sidebar-mount"></div>
      <div class="main-content">
        <header class="topbar">
          <div style="display: flex; align-items: center; gap: 12px">
            <button
              id="menu-toggle"
              class="btn btn-ghost btn-sm"
              style="display: none; padding: 8px"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <span class="topbar-title">Search Notes</span>
          </div>
        </header>
        <main class="page-content" style="max-width: 760px">
          <div class="page-header">
            <h1>Search Transcripts</h1>
            <p>Full-text search across all your notes.</p>
          </div>

          <div class="search-bar">
            <div class="search-wrapper">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
              <input
                type="text"
                id="search-input"
                class="input"
                placeholder="Search your transcripts…"
                autocomplete="off"
              />
            </div>
            <button id="search-btn" class="btn btn-primary">Search</button>
          </div>

          <div id="results-count" class="text-sm text-muted mb-2 hidden"></div>
          <div id="results" class="hidden">
            <div
              id="results-list"
              style="display: flex; flex-direction: column; gap: 12px"
            ></div>
          </div>
          <div id="empty-results" class="empty-state hidden">
            <p>No results found. Try different keywords.</p>
          </div>
          <div
            id="initial-state"
            style="text-align: center; padding: 4rem; color: var(--text-muted)"
          >
            <div style="font-size: 48px; margin-bottom: 1rem">🔍</div>
            <p>Type a keyword to search across all your transcript text.</p>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
      requireAuth();
      document.getElementById("sidebar-mount").innerHTML =
        renderSidebar("search");

      let searchTimeout;

      async function doSearch() {
        const q = document.getElementById("search-input").value.trim();
        if (q.length < 2) return;

        document.getElementById("initial-state").classList.add("hidden");
        document.getElementById("results").classList.add("hidden");
        document.getElementById("empty-results").classList.add("hidden");
        document.getElementById("results-count").classList.add("hidden");

        try {
          const data = await apiRequest(
            `/transcripts/search?q=${encodeURIComponent(q)}`,
          );
          const { results } = data;

          if (!results.length) {
            document.getElementById("empty-results").classList.remove("hidden");
            return;
          }

          document.getElementById("results-count").textContent =
            `${results.length} result${results.length !== 1 ? "s" : ""} for "${q}"`;
          document.getElementById("results-count").classList.remove("hidden");
          document.getElementById("results").classList.remove("hidden");

          document.getElementById("results-list").innerHTML = results
            .map(
              (r) => `
                    <a href="viewer.html?id=${r.transcript_id}" style="text-decoration:none;">
                        <div class="card-elevated">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                                <h4 style="color:var(--text-primary);">${r.title || "Untitled"}</h4>
                                <span class="badge badge-neutral">${r.category_name || "—"}</span>
                            </div>
                            <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;">${(r.excerpt || "").slice(0, 200)}…</p>
                            <div class="text-xs text-muted mt-1">${formatDate(r.generated_at)}</div>
                        </div>
                    </a>`,
            )
            .join("");
        } catch (err) {
          showToast("Search failed", "error");
        }
      }

      document.getElementById("search-btn").addEventListener("click", doSearch);
      document.getElementById("search-input").addEventListener("keyup", (e) => {
        if (e.key === "Enter") doSearch();
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(doSearch, 500);
      });
    </script>
  </body>
</html>
