<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – EchoNote</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="sidebar-mount"></div>
      <div class="main-content">
        <header class="topbar">
          <div style="display: flex; align-items: center; gap: 12px">
            <button
              id="menu-toggle"
              class="btn btn-ghost btn-sm"
              style="display: none; padding: 8px"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <span class="topbar-title">Admin Dashboard</span>
          </div>
          <div class="topbar-actions">
            <span class="badge badge-success">Admin</span>
          </div>
        </header>
        <main class="page-content">
          <div class="page-header">
            <h1>Admin Dashboard</h1>
            <p>System-wide analytics and user management.</p>
          </div>

          <!-- Stats -->
          <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr)">
            <div class="stat-card">
              <div class="stat-label">Total Users</div>
              <div class="stat-value" id="stat-users">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total Uploads</div>
              <div class="stat-value" id="stat-uploads">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Transcripts</div>
              <div class="stat-value" id="stat-transcripts">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Uploads Today</div>
              <div class="stat-value" id="stat-today">—</div>
            </div>
          </div>

          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 1.5rem;
              margin-bottom: 1.5rem;
            "
          >
            <!-- Category breakdown -->
            <div class="card">
              <h3 style="margin-bottom: 1rem">Category Breakdown</h3>
              <div id="category-breakdown"></div>
            </div>

            <!-- Recent uploads -->
            <div class="card">
              <h3 style="margin-bottom: 1rem">Recent Uploads</h3>
              <div
                id="recent-uploads"
                style="display: flex; flex-direction: column; gap: 8px"
              ></div>
            </div>
          </div>

          <!-- Users table -->
          <div class="page-header">
            <h2>All Users</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>User</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Uploads</th>
                  <th>Transcripts</th>
                  <th>Joined</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr>
                  <td
                    colspan="7"
                    style="
                      text-align: center;
                      padding: 2rem;
                      color: var(--text-muted);
                    "
                  >
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
      requireAuth();
      if (!auth.isAdmin()) window.location.href = "/html/dashboard.html";
      document.getElementById("sidebar-mount").innerHTML =
        renderSidebar("admin");

      async function loadAdmin() {
        try {
          const [statsData, usersData] = await Promise.all([
            apiRequest("/admin/stats"),
            apiRequest("/admin/users"),
          ]);

          const { stats, categoryStats, recentUploads } = statsData;
          document.getElementById("stat-users").textContent = stats.total_users;
          document.getElementById("stat-uploads").textContent =
            stats.total_uploads;
          document.getElementById("stat-transcripts").textContent =
            stats.total_transcripts;
          document.getElementById("stat-today").textContent =
            stats.uploads_today;

          // Category breakdown
          const total = categoryStats.reduce((a, c) => a + c.count, 0) || 1;
          document.getElementById("category-breakdown").innerHTML =
            categoryStats
              .map(
                (c) => `
                    <div style="margin-bottom:10px;">
                        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                            <span>${c.category_name}</span>
                            <span style="color:var(--text-muted);">${c.count}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${Math.round((c.count / total) * 100)}%"></div>
                        </div>
                    </div>`,
              )
              .join("");

          // Recent uploads
          document.getElementById("recent-uploads").innerHTML = (
            recentUploads || []
          )
            .map(
              (u) => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
                        <div>
                            <div style="font-size:13px;font-weight:500;">${u.original_name}</div>
                            <div style="font-size:12px;color:var(--text-muted);">${u.username}</div>
                        </div>
                        ${statusBadge(u.status)}
                    </div>`,
            )
            .join("");

          // Users table
          document.getElementById("users-tbody").innerHTML = usersData.users
            .map(
              (u) => `
                    <tr>
                        <td>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <div style="width:30px;height:30px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;">${getInitials(u.username)}</div>
                                <span style="font-weight:500;">${u.username}</span>
                            </div>
                        </td>
                        <td class="text-sm text-muted">${u.email}</td>
                        <td><span class="badge ${u.role === "admin" ? "badge-success" : "badge-neutral"}">${u.role}</span></td>
                        <td>${u.total_uploads}</td>
                        <td>${u.total_transcripts}</td>
                        <td class="text-sm text-muted">${formatDate(u.created_at)}</td>
                        <td>
                            ${u.role !== "admin" ? `<button onclick="deleteUser(${u.user_id}, this)" class="btn btn-danger btn-sm">Delete</button>` : ""}
                        </td>
                    </tr>`,
            )
            .join("");
        } catch (err) {
          showToast("Failed to load admin data", "error");
        }
      }

      async function deleteUser(id, btn) {
        if (!confirm("Permanently delete this user and all their data?"))
          return;
        btn.disabled = true;
        try {
          await apiRequest(`/admin/users/${id}`, { method: "DELETE" });
          showToast("User deleted");
          loadAdmin();
        } catch (err) {
          showToast(err.message || "Delete failed", "error");
          btn.disabled = false;
        }
      }

      loadAdmin();
    </script>
  </body>
</html>
