<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Audio – EchoNote</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      .file-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 1.5rem;
      }
      .file-item {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .file-icon {
        width: 36px;
        height: 36px;
        background: var(--accent-dim);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .file-meta {
        flex: 1;
        min-width: 0;
      }
      .file-name {
        font-size: 14px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .file-size {
        font-size: 12px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <div id="sidebar-mount"></div>
      <div class="main-content">
        <header class="topbar">
          <div style="display: flex; align-items: center; gap: 12px">
            <button
              id="menu-toggle"
              class="btn btn-ghost btn-sm"
              style="display: none; padding: 8px"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <span class="topbar-title">Upload Audio</span>
          </div>
        </header>
        <main class="page-content" style="max-width: 720px">
          <div class="page-header">
            <h1>Upload Audio</h1>
            <p>
              Supports mp3, wav, m4a up to 50MB. Transcription starts
              automatically.
            </p>
          </div>

          <!-- Drop zone -->
          <div class="upload-zone" id="drop-zone">
            <input
              type="file"
              id="file-input"
              accept=".mp3,.wav,.m4a,.webm,.ogg"
              multiple
            />
            <span class="upload-icon">🎙️</span>
            <h3>Drop audio files here</h3>
            <p>or click to browse — mp3, wav, m4a supported</p>
          </div>

          <!-- File queue -->
          <div class="file-list" id="file-list"></div>

          <!-- Upload button -->
          <div id="upload-actions" class="hidden mt-3">
            <button id="upload-btn" class="btn btn-primary">
              Upload & Transcribe
            </button>
            <button
              id="clear-btn"
              class="btn btn-ghost"
              style="margin-left: 8px"
            >
              Clear
            </button>
          </div>

          <!-- Upload progress -->
          <div id="progress-section" class="hidden mt-3">
            <div
              style="
                display: flex;
                justify-content: space-between;
                font-size: 14px;
                margin-bottom: 6px;
              "
            >
              <span id="progress-label">Uploading…</span>
              <span id="progress-pct">0%</span>
            </div>
            <div class="progress-bar">
              <div
                class="progress-fill"
                id="progress-fill"
                style="width: 0%"
              ></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
      requireAuth();
      document.getElementById("sidebar-mount").innerHTML =
        renderSidebar("upload");

      let selectedFiles = [];

      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const fileList = document.getElementById("file-list");
      const uploadActions = document.getElementById("upload-actions");

      function renderFileList() {
        uploadActions.classList.toggle("hidden", selectedFiles.length === 0);
        fileList.innerHTML = selectedFiles
          .map(
            (f, i) => `
                <div class="file-item">
                    <div class="file-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    </div>
                    <div class="file-meta">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${formatFileSize(f.size)}</div>
                    </div>
                    <button onclick="removeFile(${i})" class="btn btn-ghost btn-sm" style="padding:6px;">✕</button>
                </div>`,
          )
          .join("");
      }

      function removeFile(idx) {
        selectedFiles.splice(idx, 1);
        renderFileList();
      }

      function addFiles(files) {
        const allowed = [
          "audio/mpeg",
          "audio/wav",
          "audio/mp4",
          "audio/x-m4a",
          "audio/webm",
          "audio/ogg",
        ];
        const maxSize = 50 * 1024 * 1024;
        [...files].forEach((f) => {
          if (f.size > maxSize) {
            showToast(`${f.name} exceeds 50MB limit`, "error");
            return;
          }
          selectedFiles.push(f);
        });
        renderFileList();
      }

      fileInput.addEventListener("change", (e) => addFiles(e.target.files));

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("dragover"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        addFiles(e.dataTransfer.files);
      });

      document.getElementById("clear-btn").addEventListener("click", () => {
        selectedFiles = [];
        fileInput.value = "";
        renderFileList();
      });

      document
        .getElementById("upload-btn")
        .addEventListener("click", async () => {
          if (!selectedFiles.length) return;
          const btn = document.getElementById("upload-btn");
          const progressSection = document.getElementById("progress-section");
          const progressFill = document.getElementById("progress-fill");
          const progressLabel = document.getElementById("progress-label");
          const progressPct = document.getElementById("progress-pct");

          btn.disabled = true;
          progressSection.classList.remove("hidden");

          let uploaded = 0;
          for (const file of selectedFiles) {
            progressLabel.textContent = `Uploading ${file.name}…`;
            const formData = new FormData();
            formData.append("audio", file);

            try {
              await apiRequest("/audio/upload", {
                method: "POST",
                body: formData,
              });
              uploaded++;
              const pct = Math.round((uploaded / selectedFiles.length) * 100);
              progressFill.style.width = pct + "%";
              progressPct.textContent = pct + "%";
              showToast(`${file.name} uploaded — transcription started`);
            } catch (err) {
              showToast(
                `Failed to upload ${file.name}: ${err.message}`,
                "error",
              );
            }
          }

          progressLabel.textContent = "All uploads complete!";
          setTimeout(
            () => (window.location.href = "/html/transcripts.html"),
            1500,
          );
        });
    </script>
  </body>
</html>
