<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – EchoNote</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="sidebar-mount"></div>

      <div class="main-content">
        <header class="topbar">
          <div style="display: flex; align-items: center; gap: 12px">
            <button
              id="menu-toggle"
              class="btn btn-ghost btn-sm"
              style="display: none; padding: 8px"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <span class="topbar-title">Dashboard</span>
          </div>
          <div class="topbar-actions">
            <a href="upload.html" class="btn btn-primary btn-sm">+ Upload</a>
          </div>
        </header>

        <main class="page-content">
          <div class="page-header">
            <h1 id="greeting">Good morning 👋</h1>
            <p>Here's an overview of your transcription activity.</p>
          </div>

          <!-- Stats -->
          <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Total Uploads</div>
              <div class="stat-value" id="stat-uploads">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Transcripts</div>
              <div class="stat-value" id="stat-transcripts">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">This Month</div>
              <div class="stat-value" id="stat-month">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Storage Used</div>
              <div class="stat-value" id="stat-storage">—</div>
            </div>
          </div>

          <!-- Recent transcripts -->
          <div
            style="display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem"
          >
            <div>
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 1rem;
                "
              >
                <h3>Recent Transcripts</h3>
                <a href="transcripts.html" class="btn btn-ghost btn-sm"
                  >View all</a
                >
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Title</th>
                      <th>Category</th>
                      <th>Date</th>
                      <th>Status</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="recent-tbody">
                    <tr>
                      <td
                        colspan="5"
                        style="
                          text-align: center;
                          color: var(--text-muted);
                          padding: 2rem;
                        "
                      >
                        Loading…
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Uploads panel -->
            <div>
              <h3 style="margin-bottom: 1rem">Upload Queue</h3>
              <div
                id="upload-queue"
                style="display: flex; flex-direction: column; gap: 8px"
              >
                <div
                  style="
                    color: var(--text-muted);
                    font-size: 14px;
                    text-align: center;
                    padding: 2rem;
                  "
                >
                  No recent uploads
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
      requireAuth();
      document.getElementById("sidebar-mount").innerHTML =
        renderSidebar("dashboard");

      // Greeting
      const h = new Date().getHours();
      const greet =
        h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
      const user = auth.getUser();
      document.getElementById("greeting").textContent =
        `${greet}, ${user?.username || ""} 👋`;

      async function loadDashboard() {
        try {
          const [uploadsData, transcriptsData] = await Promise.all([
            apiRequest("/audio/uploads"),
            apiRequest("/transcripts?limit=5"),
          ]);

          const uploads = uploadsData.uploads || [];
          const transcripts = transcriptsData.transcripts || [];
          const total = transcriptsData.total || 0;

          // Stats
          document.getElementById("stat-uploads").textContent = uploads.length;
          document.getElementById("stat-transcripts").textContent = total;

          const thisMonth = uploads.filter((u) => {
            const d = new Date(u.upload_date);
            const now = new Date();
            return (
              d.getMonth() === now.getMonth() &&
              d.getFullYear() === now.getFullYear()
            );
          }).length;
          document.getElementById("stat-month").textContent = thisMonth;

          const totalBytes = uploads.reduce(
            (acc, u) => acc + (u.file_size || 0),
            0,
          );
          document.getElementById("stat-storage").textContent =
            formatFileSize(totalBytes);

          // Transcripts table
          const tbody = document.getElementById("recent-tbody");
          if (!transcripts.length) {
            tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No transcripts yet. <a href="upload.html">Upload your first audio</a></p></div></td></tr>`;
          } else {
            tbody.innerHTML = transcripts
              .map(
                (t) => `
                        <tr>
                            <td><a href="viewer.html?id=${t.transcript_id}" style="color:var(--text-primary);font-weight:500;">${t.title || t.original_name || "Untitled"}</a></td>
                            <td><span class="badge badge-neutral">${t.category_name || "Uncategorized"}</span></td>
                            <td class="text-sm text-muted">${formatRelativeTime(t.generated_at)}</td>
                            <td>${statusBadge("completed")}</td>
                            <td><a href="viewer.html?id=${t.transcript_id}" class="btn btn-ghost btn-sm">View</a></td>
                        </tr>`,
              )
              .join("");
          }

          // Upload queue
          const queue = document.getElementById("upload-queue");
          const recent = uploads.slice(0, 4);
          if (!recent.length) return;
          queue.innerHTML = recent
            .map(
              (u) => `
                    <div class="card-elevated" style="padding:1rem;">
                        <div style="font-size:13px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${u.original_name}</div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span class="text-xs text-muted">${formatFileSize(u.file_size)}</span>
                            ${statusBadge(u.status)}
                        </div>
                    </div>`,
            )
            .join("");
        } catch (err) {
          showToast("Failed to load dashboard", "error");
        }
      }

      loadDashboard();
    </script>
  </body>
</html>
