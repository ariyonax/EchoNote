version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: echonote-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: echonote_db
      MYSQL_USER: echonote_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3307:3306"
    networks:
      - echonote-net
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "echonote_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: echonote-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: echonote_user
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: echonote_db
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN: 7d
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - uploads_data:/app/server/uploads
      - logs_data:/app/logs
    ports:
      - "5000:5000"
    networks:
      - echonote-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
  uploads_data:
  logs_data:

networks:
  echonote-net:
    driver: bridge
